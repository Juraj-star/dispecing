<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>
function zoradSelect(id) {
  const select = document.getElementById(id);
  const options = Array.from(select.options);

  options.sort((a, b) =>
    a.text.localeCompare(b.text, 'sk', { sensitivity: 'base' })
  );

  select.innerHTML = '';
  options.forEach(o => select.appendChild(o));
}

function vytvorSMS() {
  const autaSelect = document.getElementById('auta');
  const vybraneAuta = Array.from(autaSelect.selectedOptions).map(o => o.value);

  const nakladka = document.getElementById('nakladka').value;
  const vykladka = document.getElementById('vykladka').value;
  const material = document.getElementById('material').value;
  const kontakt = document.getElementById('kontakt').value.trim();

  let text = "AUTÁ:\n" + vybraneAuta.join("\n") +
    "\n\nNakládka: " + nakladka +
    "\nVykládka: " + vykladka +
    "\nMateriál: " + material;

  if (kontakt !== "") {
    text += "\nKontakt: " + kontakt;
  }

  document.getElementById('vysledok').value = text;
}

function otvorSMSApp() {
  const text = document.getElementById('vysledok').value.trim();

  if (!text) {
    alert('Najprv vytvor SMS.');
    return;
  }

  window.location.href = 'sms:?&body=' + encodeURIComponent(text);
}

$(document).ready(function () {
  zoradSelect("nakladka");
  zoradSelect("vykladka");

  $('#nakladka').select2({
    width: '100%',
    placeholder: 'Vyber nakládku',
    allowClear: false
  });

  $('#vykladka').select2({
    width: '100%',
    placeholder: 'Vyber vykládku',
    allowClear: false
  });
});
</script>
